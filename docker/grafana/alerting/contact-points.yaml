apiVersion: 1

contactPoints:
  - name: email-notifications
    receivers:
      - uid: email-default
        type: email
        settings:
          addresses: 'ops@sitesync.example.com'
        disableResolveMessage: false

  - name: slack-notifications
    receivers:
      - uid: slack-ops
        type: slack
        settings:
          url: 'https://hooks.slack.com/services/T00000000/B00000000/xxxxxxxxxxxxxxxx'
          title: 'SiteSync Alert'
        disableResolveMessage: false

policies:
  - receiver: email-notifications
    group_by: ['alertname', 'severity']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: slack-notifications
        matchers:
          - severity = 'critical'
        group_wait: 10s
        repeat_interval: 1h
