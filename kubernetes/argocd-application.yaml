apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sitesync-pro
  namespace: argocd
spec:
  destination:
    namespace: sitesync
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/your-org/sitesync-pro
    path: kubernetes
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
