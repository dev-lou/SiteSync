apiVersion: v1
kind: ServiceAccount
metadata:
  name: sitesync-web
  namespace: sitesync
  labels:
    app: sitesync-web
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sitesync-web
  namespace: sitesync
  labels:
    app: sitesync-web
rules:
  # Read endpoints (needed for Kubernetes DNS resolution / internal service discovery)
  - apiGroups: ['']
    resources: ['endpoints']
    verbs: ['get', 'list', 'watch']
  # Read own pod metadata and status
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['get', 'list', 'watch']
    resourceNames: []
  # Read own service
  - apiGroups: ['']
    resources: ['services']
    verbs: ['get']
    resourceNames: ['sitesync-web']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sitesync-web
  namespace: sitesync
  labels:
    app: sitesync-web
subjects:
  - kind: ServiceAccount
    name: sitesync-web
    namespace: sitesync
roleRef:
  kind: Role
  name: sitesync-web
  apiGroup: rbac.authorization.k8s.io
